name: Verify

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.9"

      - uses: extractions/setup-just@v3

      - name: Install dependencies
        run: bun install --ignore-scripts

      - name: Verify
        run: just verify
