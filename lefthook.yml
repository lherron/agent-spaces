# Git hooks configuration
# Install: lefthook install
# Docs: https://github.com/evilmartians/lefthook

pre-commit:
  parallel: false
  commands:
    gitleaks:
      run: gitleaks protect --staged --redact
    lint:
      run: bun run lint
      stage_fixed: true
    boundaries:
      run: bun scripts/check-boundaries.ts
    harness-boundaries:
      run: bun scripts/check-runtime-contract-harness-boundaries.ts
    manifests:
      run: bun scripts/check-manifest-edges.ts
    build:
      run: bun run build

pre-push:
  parallel: false
  commands:
    install:
      run: bun install
    test:
      run: bun run test:fast
