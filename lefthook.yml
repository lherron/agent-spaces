# Git hooks configuration
# Install: lefthook install
# Docs: https://github.com/evilmartians/lefthook

pre-commit:
  parallel: false
  commands:
    gitleaks:
      run: gitleaks protect --staged --redact
    lint:
      run: bun run lint
      stage_fixed: true
    boundaries:
      run: bun scripts/check-boundaries.ts
    harness-boundaries:
      run: bun scripts/check-runtime-contract-harness-boundaries.ts
    manifests:
      run: bun scripts/check-manifest-edges.ts
    suppressions:
      run: bun scripts/check-suppressions.ts
    public-surface:
      run: bun scripts/check-public-surface.ts
    doc-reachability:
      run: bun scripts/check-doc-reachability.ts
    rule-authoring:
      run: bun scripts/check-rule-authoring.ts
    build:
      run: bun run build

pre-push:
  parallel: false
  commands:
    install:
      run: bun install
    test:
      run: bun run test:fast
