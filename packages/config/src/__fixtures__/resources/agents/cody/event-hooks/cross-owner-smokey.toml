schema = 1
name = "cross-owner-smokey"
enabled = true

[event]
source = "wrkq"

[match]
event = ["updated"]
project_scope_id = "agent-spaces"
kind = "task"

[target]
project = "{{ project_scope_id }}"
agent = "smokey"
lane = "main"
task = "{{ticket_id}}"

[input]
content = "Smoke-test {{ticket_id}}."

[originPolicy]
agent = "deny"

[cooldown]
seconds = 300
