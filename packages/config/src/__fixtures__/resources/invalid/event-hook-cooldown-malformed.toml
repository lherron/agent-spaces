schema = 1
name = "cooldown-malformed"
enabled = true

[event]
source = "wrkq"

[match]
event = ["updated"]
project_scope_id = "agent-spaces"
kind = "task"

[target]
project = "{{ project_scope_id }}"
agent = "smokey"
lane = "main"
task = "{{ticket_id}}"

[input]
content = "Run smoke tests."

[originPolicy]
agent = "deny"

[cooldown]
seconds = "five minutes"
