schema = 1

# agentchat channel
channel = "main"

# wrkq integration
[wrkq]
db_path = ""
actor = "user"

[facilitator]
id = "animata"
display = "Animata"
asp_target = "animata"
role = "ops"
harness = "claude"

[runtime]
engine = "agentchat"
launcher = "asp"
runtime_agent_id = "center-worker"
runtime_agent_target = "codex"
runtime_agent_harness = "codex"

# Agents we manage in this workbench
[[agents]]
id = "smokey"
display = "Smokey"
asp_target = "smokey"
role = "qa"
position = "top-left"

[[agents]]
id = "claude"
display = "Claude"
asp_target = "claude"
role = "coder"
position = "bottom-left"

[[agents]]
id = "codex"
display = "Codex"
asp_target = "codex"
role = "coder"
harness = "codex"
model = "gpt-5.4"
position = "bottom-right"
